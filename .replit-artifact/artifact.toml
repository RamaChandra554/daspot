kind = "web"
previewPath = "/"
title = "DA SPOT"
version = "1.0.0"
id = "artifacts/da-spot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25294

[services.development]
run = "pnpm --filter @workspace/da-spot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/da-spot", "run", "build" ]
publicDir = "artifacts/da-spot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25294"
BASE_PATH = "/"
